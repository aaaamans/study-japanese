<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文文法温習 N5〜N3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&display=swap');
  :root {
    --ink: #1a1a2e;
    --paper: #f8f6f0;
    --washi: #ede8dd;
    --vermillion: #c0392b;
    --indigo: #2c3e7a;
    --gold: #c9a84c;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --n5: #2c3e7a;
    --n4: #6b3fa0;
    --n3: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--ink); color: white;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  header h1 { font-family: "Noto Serif JP", serif; font-size: 1.25rem; letter-spacing: 0.05em; }
  header h1 span { color: var(--gold); }
  .score-badge {
    background: rgba(255,255,255,0.12); border-radius: 20px;
    padding: 5px 14px; font-size: 0.83rem; display: flex; gap: 12px;
  }
  .score-badge .c { color: #6ef4a0; } .score-badge .w { color: #ff8080; }

  nav {
    background: var(--washi); border-bottom: 2px solid var(--gold);
    display: flex; overflow-x: auto; scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    padding: 11px 18px; border: none; background: none;
    font-family: "Noto Sans JP", sans-serif; font-size: 0.88rem;
    cursor: pointer; color: #777; white-space: nowrap;
    border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s;
  }
  nav button.active { color: var(--ink); border-bottom-color: var(--vermillion); font-weight: 700; }
  nav button:hover:not(.active) { color: var(--ink); background: rgba(0,0,0,0.04); }

  .filter-bar {
    padding: 10px 18px; background: white; border-bottom: 1px solid #e0d8c8;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .filter-bar label { font-size: 0.8rem; color: #999; }
  .level-btn {
    padding: 3px 12px; border-radius: 14px; border: 2px solid transparent;
    font-size: 0.8rem; cursor: pointer; font-weight: 700; transition: all 0.15s;
    background: white;
  }
  .level-btn.all { border-color: #888; color: #555; }
  .level-btn.n5 { border-color: var(--n5); color: var(--n5); }
  .level-btn.n4 { border-color: var(--n4); color: var(--n4); }
  .level-btn.n3 { border-color: var(--n3); color: var(--n3); }
  .level-btn.active.all { background: #555; color: white; }
  .level-btn.active.n5 { background: var(--n5); color: white; }
  .level-btn.active.n4 { background: var(--n4); color: white; }
  .level-btn.active.n3 { background: var(--n3); color: white; }

  main { max-width: 720px; margin: 0 auto; padding: 22px 16px; }

  /* Progress */
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .progress-wrap { flex: 1; height: 5px; background: #e0d8c8; border-radius: 3px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--vermillion)); border-radius: 3px; transition: width 0.3s; }
  .prog-label { font-size: 0.78rem; color: #aaa; white-space: nowrap; }

  /* Quiz card */
  .quiz-card {
    background: white; border-radius: 12px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    padding: 24px 24px 20px; margin-bottom: 16px;
  }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .quiz-type { font-size: 0.72rem; letter-spacing: 0.1em; color: #bbb; text-transform: uppercase; font-weight: 700; }
  .level-tag { font-size: 0.73rem; font-weight: 700; padding: 2px 9px; border-radius: 9px; }
  .level-tag.N5 { background: #e8ecff; color: var(--n5); }
  .level-tag.N4 { background: #f0e8ff; color: var(--n4); }
  .level-tag.N3 { background: #ffeee8; color: var(--n3); }

  /* Fill-in sentence */
  .fill-sentence {
    font-size: 1.18rem; line-height: 2.0; margin-bottom: 20px; text-align: center;
    padding: 12px 8px;
  }
  .blank-word {
    display: inline-block;
    min-width: 90px; padding: 0 6px;
    border-bottom: 3px solid var(--indigo);
    color: transparent; background: #eef0ff;
    border-radius: 4px; margin: 0 3px;
    font-size: 1.0rem; vertical-align: middle;
    user-select: none;
  }
  .blank-word.revealed { color: var(--indigo); font-weight: 700; background: #e0e6ff; }

  /* Options */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
  @media (max-width: 460px) { .options { grid-template-columns: 1fr; } }
  .option-btn {
    padding: 11px 14px; border: 2px solid #e0d8c8; border-radius: 9px;
    background: var(--paper); cursor: pointer; text-align: center;
    font-family: "Noto Serif JP", serif; font-size: 1.0rem; line-height: 1.5;
    transition: all 0.15s; color: var(--ink);
  }
  .option-btn:hover:not(:disabled) { border-color: var(--indigo); background: #eef0ff; }
  .option-btn.correct { border-color: var(--correct); background: #eafaf1; color: #1a6636; font-weight: 700; }
  .option-btn.wrong { border-color: var(--wrong); background: #fdecea; color: #922b21; }

  /* Feedback */
  .feedback {
    margin-top: 12px; padding: 11px 14px; border-radius: 8px;
    font-size: 0.86rem; line-height: 1.7; display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #eafaf1; border-left: 4px solid var(--correct); color: #1a5c33; }
  .feedback.ng { background: #fdecea; border-left: 4px solid var(--wrong); color: #7b241c; }

  .nav-btns { display: flex; gap: 9px; margin-top: 16px; justify-content: flex-end; }
  .btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: "Noto Sans JP", sans-serif; font-size: 0.88rem; font-weight: 700; transition: all 0.15s; }
  .btn-primary { background: var(--indigo); color: white; }
  .btn-primary:hover { background: #1e2d5e; }
  .btn-ghost { background: var(--washi); color: #666; border: 1px solid #ccc; }
  .btn-ghost:hover { background: #ddd; }

  /* Meaning quiz */
  .meaning-q { text-align: center; padding: 8px 0 16px; }
  .meaning-q .pattern-big { font-family: "Noto Serif JP", serif; font-size: 2.2rem; font-weight: 700; display: block; margin: 10px 0 6px; }
  .meaning-q .meaning-big { font-size: 1.3rem; font-weight: 700; color: var(--vermillion); display: block; margin: 10px 0 6px; }
  .meaning-q .sub { font-size: 0.8rem; color: #aaa; }

  /* Flashcard */
  .flashcard { perspective: 1000px; cursor: pointer; margin-bottom: 14px; }
  .flashcard-inner { position: relative; width: 100%; min-height: 200px; transform-style: preserve-3d; transition: transform 0.48s; }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute; width: 100%; min-height: 200px; backface-visibility: hidden;
    background: white; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px; text-align: center;
  }
  .flashcard-back { transform: rotateY(180deg); background: var(--washi); }
  .fc-pattern { font-family: "Noto Serif JP", serif; font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .fc-hint { font-size: 0.78rem; color: #ccc; margin-top: 6px; }
  .fc-meaning { font-size: 1.2rem; font-weight: 700; color: var(--vermillion); margin-bottom: 8px; }
  .fc-conn { font-size: 0.8rem; color: #888; font-style: italic; margin-bottom: 8px; }
  .fc-ex { font-size: 0.85rem; color: #555; line-height: 1.6; }

  .section { display: none; }
  .section.active { display: block; }

  .state-msg { text-align: center; padding: 50px 20px; color: #aaa; }
  .state-msg .big { font-size: 3rem; margin-bottom: 12px; }
  .state-msg h2 { font-size: 1.1rem; color: #666; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <h1>日文温習 <span>N5〜N3</span></h1>
  <div class="score-badge">
    <span>✓ <span id="hCorrect" class="c">0</span></span>
    <span>✗ <span id="hWrong" class="w">0</span></span>
    <span>🔥 <span id="hStreak">0</span></span>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('fill')">📝 填充題</button>
  <button onclick="switchTab('meaning')">📖 文型解釋</button>
  <button onclick="switchTab('flash')">🃏 Flashcard</button>
</nav>

<div class="filter-bar">
  <label>Level：</label>
  <button class="level-btn all active" onclick="setLevel('all',this)">全部</button>
  <button class="level-btn n5" onclick="setLevel('N5',this)">N5</button>
  <button class="level-btn n4" onclick="setLevel('N4',this)">N4</button>
  <button class="level-btn n3" onclick="setLevel('N3',this)">N3</button>
</div>

<main>
  <div id="fillSection" class="section active">
    <div class="progress-row">
      <div class="progress-wrap"><div class="progress-fill" id="fillProg" style="width:0%"></div></div>
      <div class="prog-label" id="fillLbl">0 / 0</div>
    </div>
    <div id="fillCard"></div>
  </div>

  <div id="meaningSection" class="section">
    <div class="progress-row">
      <div class="progress-wrap"><div class="progress-fill" id="meaningProg" style="width:0%"></div></div>
      <div class="prog-label" id="meaningLbl">0 / 0</div>
    </div>
    <div id="meaningCard"></div>
  </div>

  <div id="flashSection" class="section">
    <div class="progress-row">
      <div class="progress-wrap"><div class="progress-fill" id="flashProg" style="width:0%"></div></div>
      <div class="prog-label" id="flashLbl">0 / 0</div>
    </div>
    <div id="flashCard"></div>
    <div class="nav-btns" style="margin-top:0">
      <button class="btn btn-ghost" onclick="prevFlash()">← 上一張</button>
      <button class="btn btn-primary" onclick="nextFlash()">下一張 →</button>
    </div>
  </div>
</main>

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function getGrammar() {
  return currentLevel === 'all' ? GRAMMAR : GRAMMAR.filter(g => g.l === currentLevel);
}
function getFill() {
  return currentLevel === 'all' ? FILL_ITEMS : FILL_ITEMS.filter(g => g.l === currentLevel);
}

function levelTag(l) { return `<span class="level-tag ${l}">${l}</span>`; }

function recordAnswer(ok) {
  if (ok) { totalC++; streak++; } else { totalW++; streak = 0; }
  document.getElementById('hCorrect').textContent = totalC;
  document.getElementById('hWrong').textContent = totalW;
  document.getElementById('hStreak').textContent = streak;
}

// ─────────────────────────────────────
//  FILL-IN-BLANK
// ─────────────────────────────────────
function buildFill() {
  fillQ = shuffle(getFill());
  fillIdx = 0;
  fillDone = false;
  renderFill();
}

function getSimilarOptions(target, n) {
  // Prefer same-level grammar items
  const pool = getGrammar().filter(g => g.p !== target.p);
  const same = shuffle(pool.filter(g => g.l === target.l));
  const other = shuffle(pool.filter(g => g.l !== target.l));
  return [...same, ...other].slice(0, n).map(g => g.p);
}

function renderFill() {
  const total = fillQ.length;
  if (total === 0) {
    document.getElementById('fillCard').innerHTML = '<div class="state-msg"><div class="big">😢</div><h2>呢個 Level 冇填充題資料</h2></div>';
    document.getElementById('fillLbl').textContent = '0 / 0';
    return;
  }
  if (fillIdx >= total) {
    document.getElementById('fillCard').innerHTML = `<div class="state-msg"><div class="big">🎉</div><h2>完成曬全部填充題！</h2><br><button class="btn btn-primary" onclick="buildFill()">再練一次</button></div>`;
    document.getElementById('fillProg').style.width = '100%';
    return;
  }

  const item = fillQ[fillIdx];
  document.getElementById('fillLbl').textContent = `${fillIdx+1} / ${total}`;
  document.getElementById('fillProg').style.width = `${(fillIdx/total)*100}%`;

  // Format sentence: replace ___ with blank span
  const sentenceHtml = item.sentence.replace('___', '<span class="blank-word" id="blankSpan">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');

  // 4 options: correct + 3 confusable
  const wrongs = getSimilarOptions(item, 3);
  const options = shuffle([item.p, ...wrongs]);

  const optsHtml = options.map((opt, i) =>
    `<button class="option-btn" id="fopt${i}" onclick="checkFill(this,'${escJ(opt)}','${escJ(item.p)}')">${opt}</button>`
  ).join('');

  document.getElementById('fillCard').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-meta"><span class="quiz-type">填充題</span>${levelTag(item.l)}</div>
      <div class="fill-sentence">${sentenceHtml}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fillFb"></div>
      <div class="nav-btns" id="fillNav" style="display:none">
        <button class="btn btn-ghost" onclick="fillIdx++;renderFill()">跳過</button>
        <button class="btn btn-primary" onclick="fillIdx++;renderFill()">下一題 →</button>
      </div>
    </div>`;
  fillDone = false;
}

function checkFill(clickedBtn, chosen, correct) {
  if (fillDone) return;
  fillDone = true;
  const ok = chosen === correct;
  recordAnswer(ok);

  // Reveal the blank
  const blank = document.getElementById('blankSpan');
  if (blank) { blank.textContent = correct; blank.classList.add('revealed'); }

  // Mark buttons
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent.trim() === correct) btn.classList.add('correct');
    else if (btn === clickedBtn && !ok) btn.classList.add('wrong');
  });

  const item = fillQ[fillIdx];
  const fb = document.getElementById('fillFb');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');

  // Good example (not the one we used — show full original)
  const origEx = item.orig || '';
  fb.innerHTML = ok
    ? `✓ 正確！<br>文型：<strong>${correct}</strong> = ${item.m}${origEx ? '<br><span style="font-size:0.82rem;color:#555">例：' + origEx + '</span>' : ''}`
    : `✗ 答案係 <strong>${correct}</strong> = ${item.m}${origEx ? '<br><span style="font-size:0.82rem;color:#777">例：' + origEx + '</span>' : ''}`;

  document.getElementById('fillNav').style.display = 'flex';
}

// ─────────────────────────────────────
//  MEANING QUIZ
// ─────────────────────────────────────
function buildMeaning() {
  meaningQ = shuffle(getGrammar().filter(g => g.p && g.m));
  meaningIdx = 0;
  meaningDone = false;
  renderMeaning();
}

function renderMeaning() {
  const total = meaningQ.length;
  if (total === 0) {
    document.getElementById('meaningCard').innerHTML = '<div class="state-msg"><div class="big">😢</div><h2>冇文型</h2></div>';
    return;
  }
  if (meaningIdx >= total) {
    document.getElementById('meaningCard').innerHTML = `<div class="state-msg"><div class="big">🎉</div><h2>完成！</h2><br><button class="btn btn-primary" onclick="buildMeaning()">再試</button></div>`;
    document.getElementById('meaningProg').style.width = '100%';
    return;
  }

  const item = meaningQ[meaningIdx];
  document.getElementById('meaningLbl').textContent = `${meaningIdx+1} / ${total}`;
  document.getElementById('meaningProg').style.width = `${(meaningIdx/total)*100}%`;

  // Random: 50% show pattern→pick meaning, 50% show meaning→pick pattern
  const mode = Math.random() < 0.5 ? 'pm' : 'mp';
  let qHtml, correct, optPool;

  if (mode === 'pm') {
    qHtml = `<div class="meaning-q">
      <span class="sub">以下文型係咩意思？</span>
      <span class="pattern-big">${item.p}</span>
      <span class="sub">接續：${item.c || '—'}</span>
    </div>`;
    correct = item.m;
    const pool = shuffle(getGrammar().filter(g => g.p !== item.p));
    optPool = shuffle([correct, ...pool.slice(0,3).map(g=>g.m)]);
  } else {
    qHtml = `<div class="meaning-q">
      <span class="sub">意思係…</span>
      <span class="meaning-big">${item.m}</span>
      <span class="sub">揀出正確文型</span>
    </div>`;
    correct = item.p;
    const pool = shuffle(getGrammar().filter(g => g.p !== item.p && g.l === item.l));
    const pool2 = shuffle(getGrammar().filter(g => g.p !== item.p && g.l !== item.l));
    optPool = shuffle([correct, ...[...pool,...pool2].slice(0,3).map(g=>g.p)]);
  }

  const optsHtml = optPool.map((opt,i) =>
    `<button class="option-btn" id="mopt${i}" onclick="checkMeaning(this,${JSON.stringify(opt)},${JSON.stringify(correct)})">${opt}</button>`
  ).join('');

  document.getElementById('meaningCard').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-meta"><span class="quiz-type">${mode==='pm'?'揀意思':'揀文型'}</span>${levelTag(item.l)}</div>
      ${qHtml}
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="meaningFb"></div>
      <div class="nav-btns" id="meaningNav" style="display:none">
        <button class="btn btn-ghost" onclick="meaningIdx++;renderMeaning()">跳過</button>
        <button class="btn btn-primary" onclick="meaningIdx++;renderMeaning()">下一題 →</button>
      </div>
    </div>`;
  meaningDone = false;
}

function checkMeaning(clickedBtn, chosen, correct) {
  if (meaningDone) return;
  meaningDone = true;
  const ok = chosen === correct;
  recordAnswer(ok);

  document.querySelectorAll('#meaningCard .option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent.trim() === correct) btn.classList.add('correct');
    else if (btn === clickedBtn && !ok) btn.classList.add('wrong');
  });

  const item = meaningQ[meaningIdx];
  const fb = document.getElementById('meaningFb');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');
  const ex = (item.e||[]).find(e => e.length>8 && /[ぁ-んァ-ヶ一-龯]/.test(e)) || '';
  fb.innerHTML = ok
    ? `✓ 正確！<strong>${item.p}</strong> = ${item.m}${ex?'<br><span style="font-size:0.82rem">例：'+ex+'</span>':''}`
    : `✗ 答案：<strong>${item.p}</strong> = ${item.m}${ex?'<br><span style="font-size:0.82rem">例：'+ex+'</span>':''}`;

  document.getElementById('meaningNav').style.display = 'flex';
}

// ─────────────────────────────────────
//  FLASHCARD
// ─────────────────────────────────────
function buildFlash() {
  flashQ = shuffle(getGrammar().filter(g=>g.p&&g.m));
  flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  const total = flashQ.length;
  if (total === 0) {
    document.getElementById('flashCard').innerHTML = '<div class="state-msg"><div class="big">📭</div><h2>冇卡片</h2></div>';
    return;
  }
  if (flashIdx >= total) {
    document.getElementById('flashCard').innerHTML = `<div class="state-msg"><div class="big">🎊</div><h2>睇完曬！</h2><br><button class="btn btn-primary" onclick="buildFlash()">再睇一次</button></div>`;
    document.getElementById('flashLbl').textContent = '完成！';
    return;
  }
  const item = flashQ[flashIdx];
  document.getElementById('flashLbl').textContent = `${flashIdx+1} / ${total}`;
  document.getElementById('flashProg').style.width = `${(flashIdx/total)*100}%`;

  const ex = (item.e||[]).find(e=>e.length>8 && /[ぁ-んァ-ヶ一-龯]/.test(e) && !e.startsWith('1️⃣')) || '';

  document.getElementById('flashCard').innerHTML = `
    <div class="flashcard" id="fc" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          ${levelTag(item.l)}
          <div class="fc-pattern" style="margin-top:14px">${item.p}</div>
          <div class="fc-hint">點撃翻轉 👆</div>
        </div>
        <div class="flashcard-back">
          ${levelTag(item.l)}
          <div class="fc-meaning" style="margin-top:12px">${item.m}</div>
          ${item.c ? `<div class="fc-conn">接續：${item.c}</div>` : ''}
          ${ex ? `<div class="fc-ex">例：${ex}</div>` : ''}
        </div>
      </div>
    </div>`;
}

function nextFlash() { flashIdx++; renderFlash(); }
function prevFlash() { if (flashIdx>0) { flashIdx--; renderFlash(); } }

// ─────────────────────────────────────
//  TAB / LEVEL SWITCHING
// ─────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active', ['fill','meaning','flash'][i]===tab);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const secId = {fill:'fillSection',meaning:'meaningSection',flash:'flashSection'}[tab];
  document.getElementById(secId).classList.add('active');
  if (tab==='fill') buildFill();
  else if (tab==='meaning') buildMeaning();
  else buildFlash();
}

function setLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (currentTab==='fill') buildFill();
  else if (currentTab==='meaning') buildMeaning();
  else buildFlash();
}

function escJ(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// Init
buildFill();
</script>
