<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文文法温習 N5〜N3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f8f6f0;
    --washi: #ede8dd;
    --vermillion: #c0392b;
    --indigo: #2c3e7a;
    --gold: #c9a84c;
    --sage: #6b7c5c;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --n5: #2c3e7a;
    --n4: #6b3fa0;
    --n3: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
  }
  header h1 span { color: var(--gold); }

  .score-badge {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85rem;
    display: flex;
    gap: 14px;
  }
  .score-badge .correct { color: #6ef4a0; }
  .score-badge .wrong { color: #ff8080; }

  /* ── Nav tabs ── */
  nav {
    background: var(--washi);
    border-bottom: 2px solid var(--gold);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    padding: 12px 20px;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    color: #666;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  nav button.active {
    color: var(--ink);
    border-bottom-color: var(--vermillion);
    font-weight: 700;
  }
  nav button:hover:not(.active) { color: var(--ink); background: rgba(0,0,0,0.04); }

  /* ── Filter bar ── */
  .filter-bar {
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #e0d8c8;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar span { font-size: 0.82rem; color: #888; }
  .level-btn {
    padding: 4px 12px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
  }
  .level-btn.n5 { border-color: var(--n5); color: var(--n5); background: white; }
  .level-btn.n4 { border-color: var(--n4); color: var(--n4); background: white; }
  .level-btn.n3 { border-color: var(--n3); color: var(--n3); background: white; }
  .level-btn.all { border-color: #888; color: #555; background: white; }
  .level-btn.active.n5 { background: var(--n5); color: white; }
  .level-btn.active.n4 { background: var(--n4); color: white; }
  .level-btn.active.n3 { background: var(--n3); color: white; }
  .level-btn.active.all { background: #555; color: white; }

  /* ── Main content area ── */
  main { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  /* ── Quiz card ── */
  .quiz-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 28px 28px 24px;
    margin-bottom: 20px;
  }
  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .quiz-type {
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: #999;
    text-transform: uppercase;
    font-weight: 700;
  }
  .level-tag {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 10px;
  }
  .level-tag.N5 { background: #e8ecff; color: var(--n5); }
  .level-tag.N4 { background: #f0e8ff; color: var(--n4); }
  .level-tag.N3 { background: #ffeee8; color: var(--n3); }

  .question {
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 20px;
    color: var(--ink);
  }
  .question .blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 2.5px solid var(--indigo);
    color: var(--indigo);
    font-weight: 700;
    text-align: center;
    margin: 0 4px;
    font-size: 1.1rem;
  }

  /* Options grid */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  @media (max-width: 480px) { .options { grid-template-columns: 1fr; } }

  .option-btn {
    padding: 12px 16px;
    border: 2px solid #e0d8c8;
    border-radius: 8px;
    background: var(--paper);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92rem;
    line-height: 1.5;
    transition: all 0.15s;
    color: var(--ink);
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--indigo);
    background: #eef0ff;
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: #eafaf1;
    color: #1a6636;
    font-weight: 700;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: #fdecea;
    color: #922b21;
  }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #eafaf1; border-left: 4px solid var(--correct); color: #1a5c33; }
  .feedback.ng { background: #fdecea; border-left: 4px solid var(--wrong); color: #7b241c; }

  /* Navigation buttons */
  .nav-btns {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    justify-content: flex-end;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--indigo); color: white; }
  .btn-primary:hover { background: #1e2d5e; }
  .btn-secondary { background: var(--washi); color: var(--ink); border: 1px solid #ccc; }
  .btn-secondary:hover { background: #ddd; }

  /* Progress bar */
  .progress-wrap {
    height: 4px;
    background: #e0d8c8;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--indigo), var(--vermillion));
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ── Flashcard mode ── */
  .flashcard {
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    min-height: 180px;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    min-height: 180px;
    backface-visibility: hidden;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }
  .flashcard-back {
    transform: rotateY(180deg);
    background: var(--washi);
  }
  .fc-pattern {
    font-family: 'Noto Serif JP', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .fc-hint { font-size: 0.8rem; color: #bbb; }
  .fc-meaning {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--vermillion);
    margin-bottom: 8px;
  }
  .fc-connection {
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 8px;
    font-style: italic;
  }
  .fc-example {
    font-size: 0.88rem;
    color: #444;
    line-height: 1.6;
  }

  /* ── Counters area ── */
  .counters {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .counter-chip {
    font-size: 0.8rem;
    padding: 4px 12px;
    border-radius: 12px;
    background: white;
    border: 1px solid #ddd;
    color: #555;
  }

  /* ── Empty/end states ── */
  .state-msg {
    text-align: center;
    padding: 40px 20px;
    color: #888;
  }
  .state-msg .big { font-size: 2.5rem; margin-bottom: 10px; }
  .state-msg h2 { font-size: 1.2rem; margin-bottom: 6px; color: var(--ink); }

  /* ── Section hidden ── */
  .section { display: none; }
  .section.active { display: block; }
</style>
</head>
<body>

<header>
  <h1>日文温習 <span>N5〜N3</span></h1>
  <div class="score-badge">
    <span>✓ <span id="totalCorrect" class="correct">0</span></span>
    <span>✗ <span id="totalWrong" class="wrong">0</span></span>
    <span id="streakDisplay">🔥 0</span>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('fill')">📝 填充題</button>
  <button onclick="switchTab('meaning')">📖 文型解釋</button>
  <button onclick="switchTab('flash')">🃏 Flashcard</button>
</nav>

<div class="filter-bar">
  <span>Level：</span>
  <button class="level-btn all active" onclick="setLevel('all', this)">全部</button>
  <button class="level-btn n5" onclick="setLevel('N5', this)">N5</button>
  <button class="level-btn n4" onclick="setLevel('N4', this)">N4</button>
  <button class="level-btn n3" onclick="setLevel('N3', this)">N3</button>
</div>

<main>
  <!-- Fill in blank section -->
  <div id="fillSection" class="section active">
    <div class="counters">
      <div class="counter-chip" id="fillCounter">題目 0 / 0</div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="fillProgress" style="width:0%"></div></div>
    <div id="fillCard"></div>
  </div>

  <!-- Meaning quiz section -->
  <div id="meaningSection" class="section">
    <div class="counters">
      <div class="counter-chip" id="meaningCounter">題目 0 / 0</div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="meaningProgress" style="width:0%"></div></div>
    <div id="meaningCard"></div>
  </div>

  <!-- Flashcard section -->
  <div id="flashSection" class="section">
    <div class="counters">
      <div class="counter-chip" id="flashCounter">卡片 0 / 0</div>
    </div>
    <div id="flashCard"></div>
    <div class="nav-btns">
      <button class="btn btn-secondary" onclick="prevFlash()">← 上一張</button>
      <button class="btn btn-primary" onclick="nextFlash()">下一張 →</button>
    </div>
  </div>
</main>

// State
let currentLevel = 'all';
let currentTab = 'fill';
let totalCorrect = 0;
let totalWrong = 0;
let streak = 0;

// Per-mode state
let fillQueue = [], fillIdx = 0, fillAnswered = false;
let meaningQueue = [], meaningIdx = 0, meaningAnswered = false;
let flashQueue = [], flashIdx = 0;

function getFiltered() {
  if (currentLevel === 'all') return GRAMMAR.filter(g => g.p && g.m);
  return GRAMMAR.filter(g => g.l === currentLevel && g.p && g.m);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getLevelTag(l) {
  return `<span class="level-tag ${l}">${l}</span>`;
}

function updateScoreDisplay() {
  document.getElementById('totalCorrect').textContent = totalCorrect;
  document.getElementById('totalWrong').textContent = totalWrong;
  document.getElementById('streakDisplay').textContent = '🔥 ' + streak;
}

function recordAnswer(correct) {
  if (correct) { totalCorrect++; streak++; }
  else { totalWrong++; streak = 0; }
  updateScoreDisplay();
}

// ═══════════════════════════════════
//  FILL IN BLANK MODE
// ═══════════════════════════════════
function buildFillQueue() {
  fillQueue = shuffle(getFiltered());
  fillIdx = 0;
  fillAnswered = false;
  renderFill();
}

function renderFill() {
  const total = fillQueue.length;
  if (total === 0) {
    document.getElementById('fillCard').innerHTML = '<div class="state-msg"><div class="big">😢</div><h2>冇文型喎</h2><p>試下揀其他 Level</p></div>';
    document.getElementById('fillCounter').textContent = '題目 0 / 0';
    document.getElementById('fillProgress').style.width = '0%';
    return;
  }
  if (fillIdx >= total) {
    document.getElementById('fillCard').innerHTML = `<div class="state-msg"><div class="big">🎉</div><h2>完成曬！</h2><p>正確：${totalCorrect} / 全部題目</p><br><button class="btn btn-primary" onclick="buildFillQueue()">再試一次</button></div>`;
    return;
  }

  const item = fillQueue[fillIdx];
  document.getElementById('fillCounter').textContent = `題目 ${fillIdx + 1} / ${total}`;
  document.getElementById('fillProgress').style.width = `${(fillIdx / total) * 100}%`;

  // Build a fill-in sentence using the pattern
  const pattern = item.p;
  // Use an example if available, otherwise pattern itself
  let sentence = '';
  const ex = (item.e || []).find(e => e.includes('。') || e.length > 8);
  if (ex && ex.includes(pattern.replace(/～/g,''))) {
    sentence = ex.replace(pattern.replace(/～/g,''), '<span class="blank">___</span>');
  } else {
    // Make a generic question: "＿＿＿ の意味は？"
    sentence = `<strong>${pattern}</strong> を使って文を完成させなさい。`;
  }

  // 4 options: correct = pattern, 3 wrong from same level
  const pool = getFiltered().filter(g => g.p !== pattern);
  const wrongs = shuffle(pool).slice(0, 3).map(g => g.p);
  const options = shuffle([pattern, ...wrongs]);

  const optionsHtml = options.map((opt, i) =>
    `<button class="option-btn" id="fopt${i}" onclick="checkFill('${escHtml(opt)}', '${escHtml(pattern)}', ${i})">${opt}</button>`
  ).join('');

  document.getElementById('fillCard').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-meta">
        <span class="quiz-type">填充題</span>
        ${getLevelTag(item.l)}
      </div>
      <div class="question">
        意思「<strong>${item.m}</strong>」嘅文型係？<br>
        <small style="color:#aaa;font-size:0.8rem">接續：${item.c || '—'}</small>
      </div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="fillFeedback"></div>
      <div class="nav-btns" id="fillNavBtns" style="display:none">
        <button class="btn btn-secondary" onclick="skipFill()">跳過</button>
        <button class="btn btn-primary" onclick="nextFill()">下一題 →</button>
      </div>
    </div>
  `;
  fillAnswered = false;
}

function escHtml(s) { return s.replace(/'/g, "\'"); }

function checkFill(chosen, correct, btnIdx) {
  if (fillAnswered) return;
  fillAnswered = true;
  const ok = chosen === correct;
  recordAnswer(ok);

  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('fopt' + i);
    if (!btn) continue;
    btn.disabled = true;
    if (btn.textContent.trim() === correct) btn.classList.add('correct');
    else if (i === btnIdx && !ok) btn.classList.add('wrong');
  }

  const item = fillQueue[fillIdx];
  const fb = document.getElementById('fillFeedback');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');
  const exText = (item.e || []).filter(e => e.length > 4 && !e.startsWith('🔸') && !e.startsWith('1️⃣')).slice(0,1).join('');
  fb.innerHTML = ok
    ? `✓ 正確！<strong>${correct}</strong> = ${item.m}<br>${exText ? '例：' + exText : ''}`
    : `✗ 答案係 <strong>${correct}</strong><br>意思：${item.m}<br>${exText ? '例：' + exText : ''}`;

  document.getElementById('fillNavBtns').style.display = 'flex';
}

function nextFill() { fillIdx++; fillAnswered = false; renderFill(); }
function skipFill() { fillIdx++; fillAnswered = false; renderFill(); }

// ═══════════════════════════════════
//  MEANING QUIZ MODE
// ═══════════════════════════════════
function buildMeaningQueue() {
  meaningQueue = shuffle(getFiltered());
  meaningIdx = 0;
  meaningAnswered = false;
  renderMeaning();
}

function renderMeaning() {
  const total = meaningQueue.length;
  if (total === 0) {
    document.getElementById('meaningCard').innerHTML = '<div class="state-msg"><div class="big">😢</div><h2>冇文型</h2></div>';
    return;
  }
  if (meaningIdx >= total) {
    document.getElementById('meaningCard').innerHTML = `<div class="state-msg"><div class="big">🎉</div><h2>完成！</h2><button class="btn btn-primary" onclick="buildMeaningQueue()">再試</button></div>`;
    return;
  }

  const item = meaningQueue[meaningIdx];
  document.getElementById('meaningCounter').textContent = `題目 ${meaningIdx + 1} / ${total}`;
  document.getElementById('meaningProgress').style.width = `${(meaningIdx / total) * 100}%`;

  // Randomly choose quiz type: meaning→pattern, or pattern→meaning
  const quizType = Math.random() < 0.5 ? 'mp' : 'pm'; // mp = meaning→pattern, pm = pattern→meaning

  let questionHtml, correctAnswer, optionsFn;

  if (quizType === 'mp') {
    // Given meaning, pick correct pattern
    questionHtml = `<span style="font-size:1.1rem">意思係</span><br><strong style="font-size:1.4rem;color:var(--vermillion)">${item.m}</strong><br><span style="font-size:0.85rem;color:#888;margin-top:6px;display:block">選出正確文型</span>`;
    correctAnswer = item.p;
    const wrongs = shuffle(getFiltered().filter(g => g.p !== item.p)).slice(0, 3).map(g => g.p);
    optionsFn = [correctAnswer, ...wrongs];
  } else {
    // Given pattern, pick correct meaning
    questionHtml = `<span style="font-size:0.9rem;color:#888">以下文型係咩意思？</span><br><strong style="font-family:'Noto Serif JP',serif;font-size:2rem;margin:8px 0;display:block">${item.p}</strong><span style="font-size:0.82rem;color:#aaa">接續：${item.c || '—'}</span>`;
    correctAnswer = item.m;
    const wrongs = shuffle(getFiltered().filter(g => g.p !== item.p)).slice(0, 3).map(g => g.m);
    optionsFn = [correctAnswer, ...wrongs];
  }

  const options = shuffle(optionsFn);
  const optionsHtml = options.map((opt, i) =>
    `<button class="option-btn" id="mopt${i}" onclick="checkMeaning(this, ${JSON.stringify(opt)}, ${JSON.stringify(correctAnswer)})">${opt}</button>`
  ).join('');

  document.getElementById('meaningCard').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-meta">
        <span class="quiz-type">${quizType === 'mp' ? '選出文型' : '選出意思'}</span>
        ${getLevelTag(item.l)}
      </div>
      <div class="question" style="text-align:center;padding:8px 0">${questionHtml}</div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="meaningFeedback"></div>
      <div class="nav-btns" id="meaningNavBtns" style="display:none">
        <button class="btn btn-secondary" onclick="skipMeaning()">跳過</button>
        <button class="btn btn-primary" onclick="nextMeaning()">下一題 →</button>
      </div>
    </div>
  `;
  meaningAnswered = false;
}

function checkMeaning(clickedBtn, chosen, correct) {
  if (meaningAnswered) return;
  meaningAnswered = true;
  const ok = chosen === correct;
  recordAnswer(ok);

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(btn => {
    btn.disabled = true;
    if (btn.textContent.trim() === correct) btn.classList.add('correct');
    else if (btn === clickedBtn && !ok) btn.classList.add('wrong');
  });

  const item = meaningQueue[meaningIdx];
  const fb = document.getElementById('meaningFeedback');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');
  const exText = (item.e || []).filter(e => e.length > 5 && !e.match(/^[→↓1-9🔸]/)).slice(0,1).join('');
  fb.innerHTML = ok
    ? `✓ 啱！<strong>${item.p}</strong> = ${item.m}${exText ? '<br>例：' + exText : ''}`
    : `✗ <strong>${item.p}</strong> = ${item.m}${exText ? '<br>例：' + exText : ''}`;

  document.getElementById('meaningNavBtns').style.display = 'flex';
}

function nextMeaning() { meaningIdx++; meaningAnswered = false; renderMeaning(); }
function skipMeaning() { meaningIdx++; meaningAnswered = false; renderMeaning(); }

// ═══════════════════════════════════
//  FLASHCARD MODE
// ═══════════════════════════════════
function buildFlashQueue() {
  flashQueue = shuffle(getFiltered());
  flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  const total = flashQueue.length;
  document.getElementById('flashCounter').textContent = `卡片 ${flashIdx + 1} / ${total}`;

  if (total === 0) {
    document.getElementById('flashCard').innerHTML = '<div class="state-msg"><div class="big">📭</div><h2>冇卡片</h2></div>';
    return;
  }

  const item = flashQueue[flashIdx];
  const exText = (item.e || []).filter(e => e.length > 4 && !e.match(/^[→↓1-9🔸]/)).slice(0,1).join('');

  document.getElementById('flashCard').innerHTML = `
    <div class="flashcard" id="fc" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="level-tag ${item.l}" style="margin-bottom:12px">${item.l}</div>
          <div class="fc-pattern">${item.p}</div>
          <div class="fc-hint">點撃翻轉睇意思 👆</div>
        </div>
        <div class="flashcard-back">
          <div class="level-tag ${item.l}" style="margin-bottom:12px">${item.l}</div>
          <div class="fc-meaning">${item.m}</div>
          ${item.c ? `<div class="fc-connection">接續：${item.c}</div>` : ''}
          ${exText ? `<div class="fc-example">例：${exText}</div>` : ''}
        </div>
      </div>
    </div>
  `;
}

function nextFlash() {
  if (flashIdx < flashQueue.length - 1) { flashIdx++; renderFlash(); }
  else {
    document.getElementById('flashCard').innerHTML = `<div class="state-msg"><div class="big">🎊</div><h2>睇完曬！</h2><br><button class="btn btn-primary" onclick="buildFlashQueue()">再睇一次</button></div>`;
    document.getElementById('flashCounter').textContent = `完成！`;
  }
}
function prevFlash() { if (flashIdx > 0) { flashIdx--; renderFlash(); } }

// ═══════════════════════════════════
//  TAB + LEVEL SWITCHING
// ═══════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['fill','meaning','flash'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

  if (tab === 'fill') { document.getElementById('fillSection').classList.add('active'); buildFillQueue(); }
  else if (tab === 'meaning') { document.getElementById('meaningSection').classList.add('active'); buildMeaningQueue(); }
  else if (tab === 'flash') { document.getElementById('flashSection').classList.add('active'); buildFlashQueue(); }
}

function setLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Rebuild current mode
  if (currentTab === 'fill') buildFillQueue();
  else if (currentTab === 'meaning') buildMeaningQueue();
  else buildFlashQueue();
}

// Init
buildFillQueue();
updateScoreDisplay();
</script>
</body>
